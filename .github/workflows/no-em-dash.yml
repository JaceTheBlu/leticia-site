name: No em dash

# Em dashes are forbidden in the vitrine (src/) and the docs (docs/). This gate
# fails the check if any U+2014 slips in, so they can never ship. Use a plain
# hyphen "-" instead.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject em dashes in docs/ and src/
        run: |
          if grep -rnP '\xe2\x80\x94' docs/ src/; then
            echo "::error::Em dash (U+2014) found above. Replace it with a plain hyphen '-'."
            exit 1
          fi
          echo "OK: no em dash in docs/ or src/."
